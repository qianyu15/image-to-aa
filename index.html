<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Image → ASCII (Paste Supported)</title>
<style>
  body {
    background: #0b0f14;
    color: #00ff9c;
    font-family: monospace;
    padding: 20px;
  }

  #box {
    border: 1px dashed #00ff9c;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
  }

  canvas {
    display: none;
  }

  pre {
    font-size: 6px;
    line-height: 6px;
    white-space: pre;
    background: #05070a;
    padding: 10px;
    overflow: auto;
  }
</style>
</head>
<body>

<h1>Image → ASCII (Paste / Drag & Drop)</h1>

<div id="box" contenteditable="true">
ここに画像を貼り付ける（Ctrl+V / 長押し貼り付け）
<br>またはドラッグ＆ドロップ
</div>

<canvas id="canvas"></canvas>
<pre id="output"></pre>

<script>
const box = document.getElementById("box");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const output = document.getElementById("output");

const chars = "@%#*+=-:. ";

function convert(image) {
  const width = 120;
  const scale = width / image.width;
  canvas.width = width;
  canvas.height = image.height * scale;

  ctx.drawImage(image, 0, 0, canvas.width, canvas.height);

  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

  let ascii = "";

  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < canvas.width; x++) {
      const i = (y * canvas.width + x) * 4;
      const r = imgData[i];
      const g = imgData[i + 1];
      const b = imgData[i + 2];

      const gray = (r + g + b) / 3;
      const charIndex = Math.floor((gray / 255) * (chars.length - 1));
      ascii += chars[charIndex];
    }
    ascii += "\n";
  }

  output.textContent = ascii;
}

// Paste対応
box.addEventListener("paste", (e) => {
  const items = e.clipboardData.items;
  for (let item of items) {
    if (item.type.indexOf("image") !== -1) {
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => convert(img);
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }
  }
});

// Drag & Drop対応
box.addEventListener("dragover", (e) => e.preventDefault());

box.addEventListener("drop", (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  const reader = new FileReader();

  reader.onload = (event) => {
    const img = new Image();
    img.onload = () => convert(img);
    img.src = event.target.result;
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
