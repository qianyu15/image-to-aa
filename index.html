<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>画像→アスキーアート変換ツール</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,\"Hiragino Kaku Gothic ProN\",\"Noto Sans JP\",sans-serif;margin:24px;color:#222}
    h1{font-size:1.4rem;margin-bottom:8px}
    .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
    label{font-size:0.9rem}
    input[type=file]{display:block}
    .preview{display:flex;gap:16px;align-items:flex-start}
    canvas{max-width:300px;border:1px solid #ddd}
    pre.ascii{white-space:pre;font-family:Menlo,Consolas,\"Courier New\",monospace;line-height:0.8;overflow:auto;padding:12px;border:1px solid #ddd;background:#f9f9f9;max-width:100%;}
    .actions{display:flex;gap:8px;margin-top:8px}
    .small{font-size:0.85rem}
    footer{margin-top:18px;color:#666;font-size:0.85rem}
    .range-label{display:inline-block;width:80px}
    select,input[type=number]{padding:6px}
    button{padding:8px 10px}
  </style>
</head>
<body>
  <h1>画像 → アスキーアート 変換ツール</h1>
  <p>画像を選択して、幅や文字セットを指定して変換します。クライアント側で完結します。</p>

  <div class="controls">
    <div>
      <label>画像ファイル
        <input id="file" type="file" accept="image/*" />
      </label>
    </div>

    <div>
      <label>幅(px)
        <input id="width" type="number" value="120" min="10" max="2000" />
      </label>
    </div>

    <div>
      <label>文字セット
        <select id="charset">
          <option value="@%#*+=-:. ">Standard (@%#*+=-:. )</option>
          <option value="$@B%8&WM#*oahkbdpqwmZ0OQLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,\"^`'. ">Detailed (wide)</option>
          <option value="█▓▒░ ">Block (dense)</option>
        </select>
      </label>
    </div>

    <div>
      <label>反転
        <input id="invert" type="checkbox" />
      </label>
    </div>

    <div>
      <label>ガンマ
        <input id="gamma" type="range" min="0.3" max="2.5" step="0.1" value="1" />
      </label>
    </div>

    <div>
      <label>行の高さ比
        <input id="aspect" type="number" value="0.5" step="0.05" min="0.1" max="1.5" />
      </label>
    </div>

    <div>
      <button id="generate">変換する</button>
    </div>
  </div>

  <div class="preview">
    <canvas id="canvas" style="display:none"></canvas>
    <div style="flex:1">
      <pre id="output" class="ascii">ここにアスキーアートが表示されます。</pre>
      <div class="actions">
        <button id="copy">クリップボードにコピー</button>
        <button id="download">テキストでダウンロード</button>
        <button id="viewImg">元画像を表示</button>
      </div>
    </div>
  </div>

  <footer>ローカルで動作します。大きな画像は幅を小さくしてから変換してください。</footer>

  <script>
    const fileEl = document.getElementById('file');
    const widthEl = document.getElementById('width');
    const charsetEl = document.getElementById('charset');
    const invertEl = document.getElementById('invert');
    const gammaEl = document.getElementById('gamma');
    const aspectEl = document.getElementById('aspect');
    const generateBtn = document.getElementById('generate');
    const canvas = document.getElementById('canvas');
    const output = document.getElementById('output');
    const copyBtn = document.getElementById('copy');
    const downloadBtn = document.getElementById('download');
    const viewImgBtn = document.getElementById('viewImg');

    let img = new Image();
    let currentDataURL = '';

    fileEl.addEventListener('change', e => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      const url = URL.createObjectURL(f);
      img = new Image();
      img.onload = () => {
        currentDataURL = url;
        output.textContent = '画像を読み込みました: ' + f.name + '\n変換ボタンを押してください。';
      };
      img.onerror = () => {
        output.textContent = '画像の読み込みに失敗しました。別の画像を試してください。';
      };
      img.src = url;
    });

    function luminance(r,g,b){
      // sRGB luminance
      return 0.2126*r + 0.7152*g + 0.0722*b;
    }

    function mapToAscii(imageData, w, h, charset, opts){
      const pixels = imageData.data;
      const outLines = [];
      const chars = charset.split('');
      const len = chars.length;
      const gamma = opts.gamma;
      const invert = opts.invert;

      for (let y = 0; y < h; y++){
        let row = '';
        for (let x = 0; x < w; x++){
          const idx = (y*w + x)*4;
          const r = pixels[idx];
          const g = pixels[idx+1];
          const b = pixels[idx+2];
          let lum = luminance(r,g,b)/255; // 0..1
          // gamma correction
          lum = Math.pow(lum, gamma);
          // invert
          if (invert) lum = 1 - lum;
          // map to charset (dark->dense char)
          const ci = Math.floor((1 - lum) * (len - 1));
          row += chars[ci];
        }
        outLines.push(row);
      }
      return outLines.join('\n');
    }

    function generate(){
      if (!img || !img.src) { output.textContent = '画像を読み込んでください。'; return; }
      const targetW = Math.max(1, Math.floor(Number(widthEl.value) || 120));
      const aspect = Number(aspectEl.value) || 0.5; // キャラクタ比

      // compute scaled size
      const scale = targetW / img.width;
      const w = targetW;
      const h = Math.max(1, Math.floor(img.height * scale * aspect));

      // draw to canvas
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      // draw with smoothing disabled for clearer blocks
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img, 0, 0, w, h);
      try {
        const imageData = ctx.getImageData(0,0,w,h);
        const charset = charsetEl.value || '@%#*+=-:. ';
        const ascii = mapToAscii(imageData, w, h, charset, {gamma: Number(gammaEl.value)||1, invert: invertEl.checked});
        output.textContent = ascii;
      } catch (err){
        output.textContent = '画像データの取得に失敗しました: ' + err.message;
      }
    }

    generateBtn.addEventListener('click', generate);

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(output.textContent);
        copyBtn.textContent = 'コピーしました';
        setTimeout(()=>copyBtn.textContent='クリップボードにコピー',1500);
      } catch(e){
        alert('コピーに失敗しました: ' + e);
      }
    });

    downloadBtn.addEventListener('click', () => {
      const text = output.textContent || '';
      const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'ascii-art.txt';
      document.body.appendChild(a);
      a.click();
      a.remove();
    });

    viewImgBtn.addEventListener('click', () => {
      if (!currentDataURL) { alert('画像が読み込まれていません'); return; }
      window.open(currentDataURL, '_blank');
    });

    // allow pressing Enter on width to trigger
    widthEl.addEventListener('keydown', e=>{ if(e.key==='Enter') generate(); });
  </script>
</body>
</html>
