<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Color ASCII Converter</title>
<style>
  body {
    background: #0b0b0b;
    color: white;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  input {
    margin-bottom: 12px;
  }

  #output {
    white-space: pre;
    font-size: 6px;
    line-height: 6px;
    letter-spacing: 1px;
    max-width: 100%;
    overflow: auto;
    background: black;
    padding: 10px;
    border: 1px solid #333;
  }

  canvas {
    display: none;
  }
</style>
</head>
<body>

<h2>🌈 Image → Color ASCII (HELL MODE)</h2>
<input type="file" id="fileInput" accept="image/*" />

<canvas id="canvas"></canvas>
<pre id="output"></pre>

<script>
const fileInput = document.getElementById("fileInput");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const output = document.getElementById("output");

// 密度高いほどリアル、でも重い
const chars = "@%#*+=-:. ";

fileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();

  img.onload = () => {
    const width = 120; // 上げるとPCが死ぬ
    const scale = width / img.width;
    const height = img.height * scale * 0.5;

    canvas.width = width;
    canvas.height = height;

    ctx.drawImage(img, 0, 0, width, height);

    const data = ctx.getImageData(0, 0, width, height).data;

    let html = "";

    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {

        const i = (y * width + x) * 4;
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];

        const brightness = (r + g + b) / 3;
        const char = chars[Math.floor((brightness / 255) * (chars.length - 1))];

        html += `<span style="color:rgb(${r},${g},${b})">${char}</span>`;
      }
      html += "<br>";
    }

    output.innerHTML = html;
  };

  img.src = URL.createObjectURL(file);
});
</script>

</body>
</html>
